services:
  site:
    build:
      context: .
      target: prod
    restart: unless-stopped
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    # Reached only through the site's nginx /api proxy, so no published ports.
    expose:
      - "8000"

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command: caddy reverse-proxy --from ${DOMAIN} --to site:80
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

services:
  site:
    build:
      context: .
      target: prod
    restart: unless-stopped
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      # Account DB lives on the mounted volume; cookies are Secure behind Caddy's HTTPS.
      # Twitch Helix creds for channel badges are set via the Admin dashboard (stored
      # in the DB), so no secrets live here.
      AUTH_DB_PATH: /data/users.db
      COOKIE_SECURE: "true"
    volumes:
      - auth_data:/data
    # Reached only through the site's nginx /api proxy, so no published ports.
    expose:
      - "8000"

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command: caddy reverse-proxy --from ${DOMAIN} --to site:80
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  auth_data:
